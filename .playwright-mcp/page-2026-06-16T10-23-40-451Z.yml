      - paragraph [ref=e84]: "Personalizza il tuo packaging con serigrafia (da 500 pezzi) e verniciatura (da 1.000 pezzi). Approfitta degli sconti automatici in base alle quantità nel carrello. Ordine minimo: €250 IVA esclusa. Quantità massima ordinabile: 3.000 pezzi per articolo."
