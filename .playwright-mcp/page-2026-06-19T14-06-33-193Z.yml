      - heading "Chi siamo" [level=1] [ref=e16]
      - generic [ref=e17]:
        - paragraph [ref=e18]: Vetronaviglio è una consolidata e riconosciuta azienda italiana operante nel settore dei contenitori per cosmetica che da oltre 30 anni si occupa di progettazione e produzione industriale di packaging primario in plastica, vetro, legno e materiali ecosostenibili per applicazioni cosmetiche, fragranze e Pharma. Crediamo che il concetto di partnership sia la chiave della nostra evoluzione aziendale. Siamo cresciuti insieme ai nostri clienti.
        - paragraph [ref=e19]: La costante e stabile crescita che ha contraddistinto Vetronaviglio fin dall'inizio è infatti il frutto di una precisa strategia imprenditoriale che ha posto al centro del suo fare il rapporto coi clienti/partner.
      - blockquote [ref=e20]: “Solo chi presidia l'intero processo dalle fasi di R&D delle materie prime alla lavorazione del packaging può avere la certezza del pieno soddisfacimento delle richieste del cliente e della perfetta rispondenza fra quanto definito in fase di progettazione e quanto realizzato.”
      - paragraph [ref=e21]: La certificazione UNI EN ISO 9001 ottenuta nel 2015 testimonia la continua attenzione tesa a sviluppare il massimo impegno per la soddisfazione del cliente. Vetronaviglio offre un supporto ideativo e progettuale affiancando il cliente partner lungo tutta la fase del processo, creativo e produttivo, con lo scopo di differenziare ogni singolo prodotto, esaltando le caratteristiche del brand e rendendolo iconicamente unico agli occhi del consumatore finale.
      - heading "Velocità, personalizzazione, comprensione delle esigenze della parte committente" [level=2] [ref=e22]
